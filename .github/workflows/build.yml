name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Prebuild (generate native Android code)
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Patch build.gradle for debug keystore signing
        run: |
          # Insert signingConfigs using debug keystore before buildTypes in app/build.gradle
          python3 - <<'EOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_config = '''
              signingConfigs {
                  release {
                      storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
          '''

          # Add signingConfigs before android { ... buildTypes
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')

          # Apply signingConfig to release build type
          content = re.sub(
              r'(release \{[^}]*?)(minifyEnabled)',
              r'\1signingConfig signingConfigs.release\n            \2',
              content,
              flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle patched successfully")
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and upload APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "APK found: $APK"
          cp "$APK" /tmp/app-release.apk
          ls -lh /tmp/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/app-release.apk
          retention-days: 30
